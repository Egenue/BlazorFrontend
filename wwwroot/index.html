<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maternity Health App</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
    <!-- Adding Tailwind CSS from CDN for rapid setup since we don't have node_modules here yet -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="NewBlazor.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="fixed inset-0 bg-slate-50 flex items-center justify-center">
            <div class="bg-white rounded-2xl p-8 shadow-2xl flex flex-col items-center gap-4">
                <div class="w-12 h-12 rounded-full border-4 border-indigo-200 border-t-indigo-600 animate-spin"></div>
                <p class="text-sm font-medium text-slate-700">Loading...</p>
            </div>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.downloadFile = (fileName, contentType, content) => {
            const blazorDownloadFile = (fileName, contentType, content) => {
                const file = new File([content], fileName, { type: contentType });
                const exportUrl = URL.createObjectURL(file);
                const a = document.createElement("a");
                document.body.appendChild(a);
                a.href = exportUrl;
                a.download = fileName;
                a.target = "_self";
                a.click();
                URL.revokeObjectURL(exportUrl);
                a.remove();
            };
            blazorDownloadFile(fileName, contentType, content);
        };

        window.showToast = (message, type) => {
            const containerId = 'toast-container';
            let container = document.getElementById(containerId);
            if (!container) {
                container = document.createElement('div');
                container.id = containerId;
                container.style.cssText = 'position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none;';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.style.cssText = `
                min-width: 280px;
                padding: 0.9rem 1.3rem;
                border-radius: 16px;
                background-color: ${type === 'success' ? '#ECFDF5' : type === 'error' ? '#FEF2F2' : '#EFF6FF'};
                border: 1px solid ${type === 'success' ? '#34D399' : type === 'error' ? '#F87171' : '#60A5FA'};
                color: ${type === 'success' ? '#065F46' : type === 'error' ? '#991B1B' : '#1E40AF'};
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
                font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-size: 0.85rem;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                opacity: 0;
                transform: translateY(-20px);
                transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                pointer-events: auto;
            `;
            
            const icon = document.createElement('span');
            icon.innerHTML = type === 'success' ? `
                <svg style="width: 1.1rem; height: 1.1rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ` : `
                <svg style="width: 1.1rem; height: 1.1rem;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            `;
            toast.appendChild(icon);
            
            const text = document.createElement('span');
            text.innerText = message;
            toast.appendChild(text);
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            }, 20);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    toast.remove();
                }, 400);
            }, 3500);
        };

        window.inactivityTracker = {
            timer: null,
            dotNetRef: null,
            timeoutMs: 0,
            events: ['mousemove', 'mousedown', 'click', 'keypress', 'scroll', 'touchstart'],
            resetTimer: function () {
                if (window.inactivityTracker.timer) {
                    clearTimeout(window.inactivityTracker.timer);
                }
                if (window.inactivityTracker.dotNetRef) {
                    window.inactivityTracker.timer = setTimeout(() => {
                        window.inactivityTracker.dotNetRef.invokeMethodAsync('OnSessionTimeout')
                            .catch(err => console.error("Error invoking OnSessionTimeout", err));
                    }, window.inactivityTracker.timeoutMs);
                }
            },
            start: function (dotNetRef, timeoutMs) {
                this.stop();
                this.dotNetRef = dotNetRef;
                this.timeoutMs = timeoutMs;
                
                this.events.forEach(event => {
                    window.addEventListener(event, this.resetTimer, { passive: true });
                });
                
                this.resetTimer();
            },
            stop: function () {
                if (this.timer) {
                    clearTimeout(this.timer);
                    this.timer = null;
                }
                if (this.events) {
                    this.events.forEach(event => {
                        window.removeEventListener(event, this.resetTimer);
                    });
                }
                this.dotNetRef = null;
            }
        };
    </script>
</body>
</html>
